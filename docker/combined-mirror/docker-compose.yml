services:
  combined-mirror:
    image: combined-mirror:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: combined-mirror
    restart: unless-stopped
    environment:
      # Sync mode: 'combined' (single timer) or 'separate' (separate timers)
      - SYNC_MODE=combined
      # CloudLinux settings
      - CLOUDLINUX_RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/CLOUDLINUX/
      - CLOUDLINUX_MIRROR_PATH=/var/www/mirrors/cloudlinux
      - CLOUDLINUX_LOG_FILE=/var/log/cloudlinux-mirror.log
      # SWNG settings
      - SWNG_RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/SWNG/
      - SWNG_MIRROR_PATH=/var/www/mirrors/swng
      - SWNG_LOG_FILE=/var/log/swng-mirror.log
      # Combined settings
      - COMBINED_LOG_FILE=/var/log/combined-mirror.log
      # Initial sync
      - INITIAL_SYNC=true
      - SYNC_INTERVAL_HOURS=4
    volumes:
      # Mirror data - adjust paths as needed
      - ${MIRROR_DATA_ROOT:-./mirror-data}/cloudlinux:/var/www/mirrors/cloudlinux
      - ${MIRROR_DATA_ROOT:-./mirror-data}/swng:/var/www/mirrors/swng
      # Logs
      - ${LOGS_ROOT:-./logs}:/var/log
    networks:
      - mirror-network
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # Optional: Nginx web server to serve the mirrors
  nginx:
    image: nginx:alpine
    container_name: mirror-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - ${MIRROR_DATA_ROOT:-./mirror-data}:/storage:ro
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx-http.conf:/etc/nginx/templates/default.http.conf.template:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        render() {
          sed "s/__CERTBOT_DOMAIN__/$${CERTBOT_DOMAIN}/g" "$1" \
            > /etc/nginx/conf.d/default.conf
        }
        CERT_PATH="/etc/letsencrypt/live/$${CERTBOT_DOMAIN}/fullchain.pem"
        if [ -f "$$CERT_PATH" ]; then
          render /etc/nginx/templates/default.conf.template
        else
          render /etc/nginx/templates/default.http.conf.template
          (
            while [ ! -f "$$CERT_PATH" ]; do
              sleep 5
            done
            render /etc/nginx/templates/default.conf.template
            nginx -s reload
          ) &
        fi
        nginx -g 'daemon off;'
    depends_on:
      - combined-mirror
    networks:
      - mirror-network

  certbot:
    image: certbot/certbot
    container_name: mirror-certbot
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@example.com}
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 10
        certbot certonly --webroot -w /var/www/certbot \
          --email "$${CERTBOT_EMAIL}" --agree-tos --no-eff-email \
          -d "$${CERTBOT_DOMAIN}" --rsa-key-size 2048 --keep-until-expiring
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done
    depends_on:
      - nginx
    networks:
      - mirror-network

networks:
  mirror-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-www:
