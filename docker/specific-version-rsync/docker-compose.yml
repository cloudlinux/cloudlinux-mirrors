version: '3.8'

services:
  swng-9-mirror:
    image: swng-version-mirror:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swng-9-mirror
    restart: unless-stopped
    environment:
      - CLOUDLINUX_VERSION=9
      - RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/SWNG/9/
      - MIRROR_PATH=/var/www/mirrors/swng/9
      - LOG_FILE=/var/log/swng-9-mirror.log
      - INITIAL_SYNC=true
      - SYNC_INTERVAL_HOURS=6
    volumes:
      # Mirror data - adjust path as needed
      - ${MIRROR_DATA_ROOT:-./mirror-data}/9:/var/www/mirrors/swng/9
      # Logs
      - ${LOGS_ROOT:-./logs}:/var/log
    networks:
      - mirror-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx web server to serve the mirrors
  nginx:
    image: nginx:alpine
    container_name: swng-version-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ${MIRROR_DATA_ROOT:-./mirror-data}:/storage/swng:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - swng-9-mirror
    networks:
      - mirror-network

  # Uncomment to also mirror CloudLinux 8
  #swng-8-mirror:
  #  image: swng-version-mirror:latest
  #  build:
  #    context: .
  #    dockerfile: Dockerfile
  #  container_name: swng-8-mirror
  #  restart: unless-stopped
  #  environment:
  #    - CLOUDLINUX_VERSION=8
