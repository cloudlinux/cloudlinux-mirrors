---
- name: Verify Combined CloudLinux and SWNG mirror setup
  hosts: mirror_servers
  become: yes
  vars_files:
    - defaults/main.yml

  tasks:
    - name: Check storage mountpoint
      command: mountpoint -q {{ mirror_base_path }}
      register: mountpoint_check
      changed_when: false
      failed_when: false

    - name: Report storage mount
      debug:
        msg: "OK: {{ mirror_base_path }} is mounted"
      when: mountpoint_check.rc == 0

    - name: Fail if storage not mounted
      fail:
        msg: "ERROR: {{ mirror_base_path }} is not mounted"
      when: mountpoint_check.rc != 0

    - name: Check CloudLinux mirror directory exists
      stat:
        path: "{{ cloudlinux_mirror_path }}"
      register: cloudlinux_dir

    - name: Assert CloudLinux mirror directory exists
      assert:
        that:
          - cloudlinux_dir.stat.exists
          - cloudlinux_dir.stat.isdir
        success_msg: "OK: mirror dir {{ cloudlinux_mirror_path }} exists"
        fail_msg: "ERROR: mirror dir {{ cloudlinux_mirror_path }} missing"

    - name: Check SWNG mirror directory exists
      stat:
        path: "{{ swng_mirror_path }}"
      register: swng_dir

    - name: Assert SWNG mirror directory exists
      assert:
        that:
          - swng_dir.stat.exists
          - swng_dir.stat.isdir
        success_msg: "OK: mirror dir {{ swng_mirror_path }} exists"
        fail_msg: "ERROR: mirror dir {{ swng_mirror_path }} missing"

    - name: Check CloudLinux mirror directory is non-empty
      command: find {{ cloudlinux_mirror_path }} -mindepth 1 -maxdepth 1 -print -quit
      register: cloudlinux_content
      changed_when: false
      failed_when: false

    - name: Check SWNG mirror directory is non-empty
      command: find {{ swng_mirror_path }} -mindepth 1 -maxdepth 1 -print -quit
      register: swng_content
      changed_when: false
      failed_when: false

    - name: Check combined timer (combined mode)
      systemd:
        name: "{{ service_name }}.timer"
      register: combined_timer
      when: sync_mode == "combined"

    - name: Assert combined timer active
      assert:
        that:
          - combined_timer.status.ActiveState == "active"
        success_msg: "OK: {{ service_name }}.timer is active"
        fail_msg: "ERROR: {{ service_name }}.timer is not active"
      when: sync_mode == "combined"

    - name: Check separate timers (separate mode)
      systemd:
        name: "{{ item }}.timer"
      register: separate_timers
      loop:
        - cloudlinux-mirror
        - swng-mirror
      when: sync_mode == "separate"

    - name: Assert separate timers active
      assert:
        that:
          - item.status.ActiveState == "active"
        success_msg: "OK: {{ item.name }} is active"
        fail_msg: "ERROR: {{ item.name }} is not active"
      loop: "{{ separate_timers.results | default([]) }}"
      when: sync_mode == "separate"

    - name: Check nginx service
      systemd:
        name: nginx
      register: nginx_service

    - name: Assert nginx active
      assert:
        that:
          - nginx_service.status.ActiveState == "active"
        success_msg: "OK: nginx is active"
        fail_msg: "ERROR: nginx is not active"

    - name: Check if Let's Encrypt certificate exists
      stat:
        path: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      register: certbot_cert

    - name: Check HTTP access to /cloudlinux/ (allow redirect)
      uri:
        url: "http://{{ mirror_domain }}/cloudlinux/"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 200
          - 301
          - 302

    - name: Check HTTP access to /swng/ (allow redirect)
      uri:
        url: "http://{{ mirror_domain }}/swng/"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 200
          - 301
          - 302

    - name: Check HTTP redirect for /cloudlinux (no trailing slash)
      uri:
        url: "http://{{ mirror_domain }}/cloudlinux"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 301
          - 302

    - name: Check HTTP redirect for /swng (no trailing slash)
      uri:
        url: "http://{{ mirror_domain }}/swng"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 301
          - 302

    - name: Check if Let's Encrypt certificate exists
      stat:
        path: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      register: certbot_cert

    - name: Check HTTPS access to /cloudlinux/ (when cert exists)
      uri:
        url: "https://{{ mirror_domain }}/cloudlinux/"
        method: HEAD
        return_content: no
        status_code:
          - 200
          - 301
          - 302
        validate_certs: true
      when: certbot_cert.stat.exists | default(false)

    - name: Check HTTPS access to /swng/ (when cert exists)
      uri:
        url: "https://{{ mirror_domain }}/swng/"
        method: HEAD
        return_content: no
        status_code:
          - 200
          - 301
          - 302
        validate_certs: true
      when: certbot_cert.stat.exists | default(false)

    - name: Verification complete
      debug:
        msg: "OK: verification completed"

