server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable directory listing
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # CloudLinux repositories
    location /cloudlinux/ {
        alias /usr/share/nginx/html/cloudlinux/;
        autoindex on;
    }

    # SWNG repositories
    location /swng/ {
        alias /usr/share/nginx/html/swng/;
        autoindex on;
    }

    # Root location
    location / {
        try_files $uri $uri/ =404;
    }
}
