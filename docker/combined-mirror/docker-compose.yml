version: '3.8'

services:
  combined-mirror:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: combined-mirror
    restart: unless-stopped
    environment:
      # Sync mode: 'combined' (single timer) or 'separate' (separate timers)
      - SYNC_MODE=combined
      # CloudLinux settings
      - CLOUDLINUX_RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/CLOUDLINUX/
      - CLOUDLINUX_MIRROR_PATH=/var/www/mirrors/cloudlinux
      - CLOUDLINUX_LOG_FILE=/var/log/cloudlinux-mirror.log
      # SWNG settings
      - SWNG_RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/SWNG/
      - SWNG_MIRROR_PATH=/var/www/mirrors/swng
      - SWNG_LOG_FILE=/var/log/swng-mirror.log
      # Combined settings
      - COMBINED_LOG_FILE=/var/log/combined-mirror.log
      # Initial sync
      - INITIAL_SYNC=true
      - SYNC_INTERVAL_HOURS=4
    volumes:
      # Mirror data - adjust paths as needed
      - ./mirror-data/cloudlinux:/var/www/mirrors/cloudlinux
      - ./mirror-data/swng:/var/www/mirrors/swng
      # Logs
      - ./logs:/var/log
    networks:
      - mirror-network
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # Optional: Nginx web server to serve the mirrors
  nginx:
    image: nginx:alpine
    container_name: mirror-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./mirror-data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - combined-mirror
    networks:
      - mirror-network

networks:
  mirror-network:
    driver: bridge
