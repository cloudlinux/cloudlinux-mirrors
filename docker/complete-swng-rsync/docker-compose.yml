services:
  swng-mirror:
    image: swng-mirror:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swng-mirror
    restart: unless-stopped
    environment:
      - RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/SWNG/
      - MIRROR_PATH=/var/www/mirrors/swng
      - LOG_FILE=/var/log/swng-mirror.log
      - INITIAL_SYNC=true
      - SYNC_INTERVAL_HOURS=4
    volumes:
      # Mirror data - adjust path as needed
      - ${MIRROR_DATA_ROOT:-./mirror-data}:/var/www/mirrors/swng
      # Logs
      - ${LOGS_ROOT:-./logs}:/var/log
    networks:
      - mirror-network
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx web server to serve the mirror
  nginx:
    image: nginx:alpine
    container_name: swng-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - ${MIRROR_DATA_ROOT:-./mirror-data}:/storage/swng:ro
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx-http.conf:/etc/nginx/templates/default.http.conf.template:ro
      # Let's Encrypt certificates
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        render() {
          sed "s/__CERTBOT_DOMAIN__/$${CERTBOT_DOMAIN}/g" "$1" \
            > /etc/nginx/conf.d/default.conf
        }
        CERT_PATH="/etc/letsencrypt/live/$${CERTBOT_DOMAIN}/fullchain.pem"
        if [ -f "$$CERT_PATH" ]; then
          render /etc/nginx/templates/default.conf.template
        else
          render /etc/nginx/templates/default.http.conf.template
          (
            while [ ! -f "$$CERT_PATH" ]; do
              sleep 5
            done
            render /etc/nginx/templates/default.conf.template
            nginx -s reload
          ) &
        fi
        nginx -g 'daemon off;'
    depends_on:
      - swng-mirror
    networks:
      - mirror-network

  certbot:
    image: certbot/certbot
    container_name: swng-certbot
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@example.com}
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Wait for nginx to start serving ACME challenges
        sleep 10
        certbot certonly --webroot -w /var/www/certbot \
          --email "$${CERTBOT_EMAIL}" --agree-tos --no-eff-email \
          -d "$${CERTBOT_DOMAIN}" --rsa-key-size 2048 --keep-until-expiring
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done
    depends_on:
      - nginx
    networks:
      - mirror-network

networks:
  mirror-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-www:
