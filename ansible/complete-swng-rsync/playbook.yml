---
- name: Setup Complete SWNG Repository Mirror with RSync
  hosts: mirror_servers
  become: yes
  vars:
    mirror_base_path: /var/www/mirrors
    swng_mirror_path: "{{ mirror_base_path }}/swng"
    rsync_source: rsync://rsync.upstream.cloudlinux.com/SWNG/
    sync_log_file: /var/log/swng-mirror.log
    sync_interval_hours: 4
    timer_schedule: "*-*-* 00,04,08,12,16,20:00:00"
    # SSL/Certbot configuration
    mirror_domain: "{{ inventory_hostname }}"
    certbot_email: "admin@{{ mirror_domain }}"
    certbot_authenticator: standalone  # Options: standalone, webroot
    certbot_webroot: "{{ mirror_base_path }}/acme"
    certbot_enabled: true
    certbot_cron_enabled: true
    certbot_cron_schedule:
      minute: 0
      hour: 3

  tasks:
    - name: Check available disk space
      command: df -h {{ mirror_base_path }}
      register: disk_space
      changed_when: false

    - name: Display available disk space
      debug:
        msg: "{{ disk_space.stdout_lines }}"

    - name: Create mirror directory
      file:
        path: "{{ swng_mirror_path }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Install rsync if not present
      package:
        name: rsync
        state: present

    - name: Perform initial SWNG repository sync
      command: >
        rsync -av --delete
        --progress
        --log-file={{ sync_log_file }}
        {{ rsync_source }}
        {{ swng_mirror_path }}/
      async: 3600
      poll: 0
      register: initial_sync
      ignore_errors: yes

    - name: Create systemd service for SWNG mirror sync
      template:
        src: swng-mirror.service.j2
        dest: /etc/systemd/system/swng-mirror.service
        mode: '0644'
      notify: reload systemd

    - name: Create systemd timer for SWNG mirror sync
      template:
        src: swng-mirror.timer.j2
        dest: /etc/systemd/system/swng-mirror.timer
        mode: '0644'
      notify: reload systemd

    - name: Enable and start SWNG mirror timer
      systemd:
        name: swng-mirror.timer
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Check timer status
      command: systemctl status swng-mirror.timer
      register: timer_status
      changed_when: false

    - name: Display timer status
      debug:
        msg: "{{ timer_status.stdout_lines }}"

    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Create Nginx configuration for SWNG mirror
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/swng-mirror.conf
        mode: '0644'
      notify: restart nginx

    - name: Enable and start Nginx (for certbot)
      systemd:
        name: nginx
        enabled: yes
        state: started
      when: certbot_enabled | bool

    - name: Install certbot packages
      package:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: certbot_enabled | bool

    - name: Create webroot for ACME challenge (when using webroot)
      file:
        path: "{{ certbot_webroot }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'

    - name: Stop nginx for standalone auth (if running)
      systemd:
        name: nginx
        state: stopped
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using standalone
      command: >
        certbot certonly --standalone --preferred-challenges http
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using webroot
      command: >
        certbot certonly --webroot
        --webroot-path {{ certbot_webroot }}
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'
      ignore_errors: true

    - name: Start nginx after standalone certbot
      systemd:
        name: nginx
        state: started
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'

    - name: Create Nginx HTTPS configuration for SWNG mirror
      template:
        src: nginx-https.conf.j2
        dest: /etc/nginx/conf.d/swng-mirror-https.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Update HTTP Nginx configuration to redirect to HTTPS
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/swng-mirror.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Ensure certbot renew cron job exists
      cron:
        name: "Certbot renew"
        job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
        minute: "{{ certbot_cron_schedule.minute }}"
        hour: "{{ certbot_cron_schedule.hour }}"
      when: certbot_enabled | bool and certbot_cron_enabled | bool

    - name: Check Nginx status
      command: systemctl status nginx
      register: nginx_status
      changed_when: false

    - name: Display Nginx status
      debug:
        msg: "{{ nginx_status.stdout_lines }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
