  #    - MIRROR_PATH=/var/www/mirrors/swng/8
  #    - LOG_FILE=/var/log/swng-8-mirror.log
  #    - INITIAL_SYNC=true
  #    - SYNC_INTERVAL_HOURS=6
  #  volumes:
  #    - ${MIRROR_DATA_ROOT:-./mirror-data}/8:/var/www/mirrors/swng/8
  #    - ${LOGS_ROOT:-./logs}:/var/log
  #  networks:
  #    - mirror-network
  #  deploy:
  #    resources:
  #      limits:
  #        cpus: '2'
  #        memory: 2G
  #      reservations:
  #        cpus: '0.5'
  #        memory: 512M

networks:
  mirror-network:
    driver: bridge
