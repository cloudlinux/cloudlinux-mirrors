services:
  swng-9-mirror:
    image: swng-version-mirror:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swng-9-mirror
    restart: unless-stopped
    environment:
      - CLOUDLINUX_VERSION=9
      - RSYNC_SOURCE=rsync://rsync.upstream.cloudlinux.com/SWNG/9/
      - MIRROR_PATH=/var/www/mirrors/swng/9
      - LOG_FILE=/var/log/swng-9-mirror.log
      - INITIAL_SYNC=true
      - SYNC_INTERVAL_HOURS=6
    volumes:
      # Mirror data - adjust path as needed
      - ${MIRROR_DATA_ROOT:-./mirror-data}/9:/var/www/mirrors/swng/9
      # Logs
      - ${LOGS_ROOT:-./logs}:/var/log
    networks:
      - mirror-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx web server to serve the mirrors
  nginx:
    image: nginx:alpine
    container_name: swng-version-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - ${MIRROR_DATA_ROOT:-./mirror-data}:/storage/swng:ro
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx-http.conf:/etc/nginx/templates/default.http.conf.template:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        render() {
          sed "s/__CERTBOT_DOMAIN__/$${CERTBOT_DOMAIN}/g" "$1" \
            > /etc/nginx/conf.d/default.conf
        }
        CERT_PATH="/etc/letsencrypt/live/$${CERTBOT_DOMAIN}/fullchain.pem"
        if [ -f "$$CERT_PATH" ]; then
          render /etc/nginx/templates/default.conf.template
        else
          render /etc/nginx/templates/default.http.conf.template
          (
            while [ ! -f "$$CERT_PATH" ]; do
              sleep 5
            done
            render /etc/nginx/templates/default.conf.template
            nginx -s reload
          ) &
        fi
        nginx -g 'daemon off;'
    depends_on:
      - swng-9-mirror
    networks:
      - mirror-network

  certbot:
    image: certbot/certbot
    container_name: swng-version-certbot
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@example.com}
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-mirror.example.com}
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 10
        certbot certonly --webroot -w /var/www/certbot \
          --email "$${CERTBOT_EMAIL}" --agree-tos --no-eff-email \
          -d "$${CERTBOT_DOMAIN}" --rsa-key-size 2048 --keep-until-expiring
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done
    depends_on:
      - nginx
    networks:
      - mirror-network

  # Uncomment to also mirror CloudLinux 8
