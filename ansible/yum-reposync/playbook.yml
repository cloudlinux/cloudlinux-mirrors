---
- name: Setup SWNG Mirror with yum-reposync
  hosts: mirror_servers
  become: yes
  vars_files:
    - defaults/main.yml

  tasks:
    - name: Check available disk space
      command: df -h {{ mirror_base_path }}
      register: disk_space
      changed_when: false

    - name: Display available disk space
      debug:
        msg: "{{ disk_space.stdout_lines }}"

    - name: Create SWNG repository configuration file
      template:
        src: swng-upstream.repo.j2
        dest: /etc/yum.repos.d/swng-upstream.repo
        mode: '0644'
      notify: clean yum cache

    - name: Install required packages
      package:
        name:
          - yum-utils
          - createrepo
        state: present

    - name: Create mirror directory
      file:
        path: "{{ swng_mirror_path }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
        recurse: yes

    - name: Import CloudLinux GPG key if not present
      rpm_key:
        state: present
        key: https://repo.cloudlinux.com/cloudlinux/RPM-GPG-KEY-cloudlinux
      ignore_errors: yes

    - name: Perform initial repository sync
      command: >
        reposync -p {{ swng_mirror_path }}/
        --repo {{ item.name }}
        {% if item.module_platform_id is defined %}
        --setopt=module_platform_id={{ item.module_platform_id }}
        {% endif %}
      async: 3600
      poll: 0
      register: initial_sync
      ignore_errors: yes
      loop: "{{ swng_repos }}"
      when: item.enabled

    - name: Ensure repo directories exist before createrepo
      file:
        path: "{{ swng_mirror_path }}/{{ item.name }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop: "{{ swng_repos }}"
      when: item.enabled

    - name: Update repository metadata for synced repos
      command: createrepo {{ swng_mirror_path }}/{{ item.name }}/
      loop: "{{ swng_repos }}"
      when: item.enabled
      ignore_errors: yes

    - name: Create systemd service for SWNG reposync
      template:
        src: swng-reposync.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: '0644'
      notify: reload systemd

    - name: Create systemd timer for SWNG reposync
      template:
        src: swng-reposync.timer.j2
        dest: "/etc/systemd/system/{{ service_name }}.timer"
        mode: '0644'
      notify: reload systemd

    - name: Enable and start SWNG reposync timer
      systemd:
        name: "{{ service_name }}.timer"
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Check timer status
      command: systemctl status {{ service_name }}.timer
      register: timer_status
      changed_when: false

    - name: Display timer status
      debug:
        msg: "{{ timer_status.stdout_lines }}"

    - name: Install epel-release (required for python3-dotenv on RedHat-family)
      tags: healthcheck
      ansible.builtin.package:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Install python3-dotenv (required by healthcheck_update.py)
      tags: healthcheck
      ansible.builtin.package:
        name: python3-dotenv
        state: present

    - name: Ensure /opt/healthcheck directory exists
      tags: healthcheck
      ansible.builtin.file:
        path: /opt/healthcheck
        state: directory
        mode: '0755'

    - name: Install healthcheck_update.py (shared from ansible/healthcheck/)
      tags: healthcheck
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../healthcheck/healthcheck_update.py"
        dest: /opt/healthcheck/healthcheck_update.py
        mode: '0755'

    - name: Deploy /opt/healthcheck/.env (idempotent, preserves customer edits)
      tags: healthcheck
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../healthcheck/.env"
        dest: /opt/healthcheck/.env
        mode: '0644'
        force: false

    - name: Ensure /var/www directory exists (serves /healthcheck HTML)
      tags: healthcheck
      ansible.builtin.file:
        path: /var/www
        state: directory
        mode: '0755'

    - name: Generate initial /healthcheck so it is available before first sync completes
      tags: healthcheck
      ansible.builtin.command:
        cmd: /usr/bin/python3 /opt/healthcheck/healthcheck_update.py --service sync --field repo --value {{ healthcheck_source_name }} --status PENDING
      args:
        creates: /var/www/healthcheck.html

    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Create Nginx configuration for SWNG reposync mirror
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/swng-reposync-mirror.conf
        mode: '0644'
      notify: restart nginx

    - name: Enable and start Nginx (for certbot)
      systemd:
        name: nginx
        enabled: yes
        state: started
      when: certbot_enabled | bool

    - name: Install dnf plugins (for config-manager)
      package:
        name: dnf-plugins-core
        state: present
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'

    - name: Install EPEL repository
      package:
        name: epel-release
        state: present
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Enable EPEL repository
      command: dnf config-manager --set-enabled epel
      changed_when: false
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Refresh DNF metadata
      command: dnf makecache --refresh
      changed_when: false
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'

    - name: Install certbot packages
      package:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: certbot_enabled | bool

    - name: Create webroot for ACME challenge (when using webroot)
      file:
        path: "{{ certbot_webroot }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'

    - name: Stop nginx for standalone auth (if running)
      systemd:
        name: nginx
        state: stopped
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using standalone
      command: >
        certbot certonly --standalone --preferred-challenges http
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using webroot
      command: >
        certbot certonly --webroot
        --webroot-path {{ certbot_webroot }}
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'
      ignore_errors: true

    - name: Start nginx after standalone certbot
      systemd:
        name: nginx
        state: started
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'

    - name: Create Nginx HTTPS configuration for SWNG reposync mirror
      template:
        src: nginx-https.conf.j2
        dest: /etc/nginx/conf.d/swng-reposync-mirror-https.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Update HTTP Nginx configuration to redirect to HTTPS
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/swng-reposync-mirror.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Ensure certbot renew cron job exists
      cron:
        name: "Certbot renew"
        job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
        minute: "{{ certbot_cron_schedule.minute }}"
        hour: "{{ certbot_cron_schedule.hour }}"
      when: certbot_enabled | bool and certbot_cron_enabled | bool

    - name: Check Nginx status
      command: systemctl status nginx
      register: nginx_status
      changed_when: false

    - name: Display Nginx status
      debug:
        msg: "{{ nginx_status.stdout_lines }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: clean yum cache
      command: yum clean all
      ignore_errors: yes

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
