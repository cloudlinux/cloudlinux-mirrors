---
- name: Setup Combined CloudLinux and SWNG Mirror
  hosts: mirror_servers
  become: yes
  vars_files:
    - defaults/main.yml

  tasks:
    - name: Check available disk space
      command: df -h {{ mirror_base_path }}
      register: disk_space
      changed_when: false

    - name: Display available disk space
      debug:
        msg: "{{ disk_space.stdout_lines }}"

    - name: Create CloudLinux mirror directory
      file:
        path: "{{ cloudlinux_mirror_path }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Create SWNG mirror directory
      file:
        path: "{{ swng_mirror_path }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Install rsync if not present
      package:
        name: rsync
        state: present

    - name: Perform initial CloudLinux repository sync
      command: >
        rsync -av --delete
        --progress
        --log-file={{ cloudlinux_sync_log }}
        {{ cloudlinux_rsync_source }}
        {{ cloudlinux_mirror_path }}/
      async: 3600
      poll: 0
      register: cloudlinux_initial_sync
      ignore_errors: yes

    - name: Perform initial SWNG repository sync
      command: >
        rsync -av --delete
        --progress
        --log-file={{ swng_sync_log }}
        {{ swng_rsync_source }}
        {{ swng_mirror_path }}/
      async: 3600
      poll: 0
      register: swng_initial_sync
      ignore_errors: yes

    - name: Create combined systemd service (when sync_mode is combined)
      template:
        src: cloudlinux-complete-mirror.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: '0644'
      when: sync_mode == 'combined'
      notify: reload systemd

    - name: Create combined systemd timer (when sync_mode is combined)
      template:
        src: cloudlinux-complete-mirror.timer.j2
        dest: "/etc/systemd/system/{{ service_name }}.timer"
        mode: '0644'
      when: sync_mode == 'combined'
      notify: reload systemd

    - name: Create separate CloudLinux service (when sync_mode is separate)
      template:
        src: cloudlinux-mirror.service.j2
        dest: /etc/systemd/system/cloudlinux-mirror.service
        mode: '0644'
      when: sync_mode == 'separate'
      notify: reload systemd

    - name: Create separate CloudLinux timer (when sync_mode is separate)
      template:
        src: cloudlinux-mirror.timer.j2
        dest: /etc/systemd/system/cloudlinux-mirror.timer
        mode: '0644'
      when: sync_mode == 'separate'
      notify: reload systemd

    - name: Create separate SWNG service (when sync_mode is separate)
      template:
        src: swng-mirror.service.j2
        dest: /etc/systemd/system/swng-mirror.service
        mode: '0644'
      when: sync_mode == 'separate'
      notify: reload systemd

    - name: Create separate SWNG timer (when sync_mode is separate)
      template:
        src: swng-mirror.timer.j2
        dest: /etc/systemd/system/swng-mirror.timer
        mode: '0644'
      when: sync_mode == 'separate'
      notify: reload systemd

    - name: Enable and start combined timer (when sync_mode is combined)
      systemd:
        name: "{{ service_name }}.timer"
        enabled: yes
        state: started
        daemon_reload: yes
      when: sync_mode == 'combined'

    - name: Enable and start separate timers (when sync_mode is separate)
      systemd:
        name: "{{ item }}.timer"
        enabled: yes
        state: started
        daemon_reload: yes
      loop:
        - cloudlinux-mirror
        - swng-mirror
      when: sync_mode == 'separate'

    - name: Check timer status
      command: >
        {% if sync_mode == 'combined' %}
        systemctl status {{ service_name }}.timer
        {% else %}
        systemctl status cloudlinux-mirror.timer swng-mirror.timer
        {% endif %}
      register: timer_status
      changed_when: false

    - name: Display timer status
      debug:
        msg: "{{ timer_status.stdout_lines }}"

    - name: Install epel-release (required for python3-dotenv on RedHat-family)
      tags: healthcheck
      ansible.builtin.package:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Install python3-dotenv (required by healthcheck_update.py)
      tags: healthcheck
      ansible.builtin.package:
        name: python3-dotenv
        state: present

    - name: Ensure /opt/healthcheck directory exists
      tags: healthcheck
      ansible.builtin.file:
        path: /opt/healthcheck
        state: directory
        mode: '0755'

    - name: Install healthcheck_update.py (shared from ansible/healthcheck/)
      tags: healthcheck
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../healthcheck/healthcheck_update.py"
        dest: /opt/healthcheck/healthcheck_update.py
        mode: '0755'

    - name: Deploy /opt/healthcheck/.env (idempotent, preserves customer edits)
      tags: healthcheck
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../healthcheck/.env"
        dest: /opt/healthcheck/.env
        mode: '0644'
        force: false

    - name: Ensure /var/www directory exists (serves /healthcheck HTML)
      tags: healthcheck
      ansible.builtin.file:
        path: /var/www
        state: directory
        mode: '0755'

    - name: Generate initial /healthcheck so it is available before first sync completes
      tags: healthcheck
      ansible.builtin.command:
        cmd: /usr/bin/python3 /opt/healthcheck/healthcheck_update.py --service sync --field repo --value {{ healthcheck_source_name }} --status PENDING
      args:
        creates: /var/www/healthcheck.html

    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Create Nginx configuration for combined mirror
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/combined-mirror.conf
        mode: '0644'
      notify: restart nginx

    - name: Enable and start Nginx (for certbot)
      systemd:
        name: nginx
        enabled: yes
        state: started
      when: certbot_enabled | bool

    - name: Install dnf plugins (for config-manager)
      package:
        name: dnf-plugins-core
        state: present
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'

    - name: Install EPEL repository
      package:
        name: epel-release
        state: present
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Enable EPEL repository
      command: dnf config-manager --set-enabled epel
      changed_when: false
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'
      ignore_errors: true

    - name: Refresh DNF metadata
      command: dnf makecache --refresh
      changed_when: false
      when: certbot_enabled | bool and ansible_facts['os_family'] == 'RedHat'

    - name: Install certbot packages
      package:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: certbot_enabled | bool

    - name: Create webroot for ACME challenge (when using webroot)
      file:
        path: "{{ certbot_webroot }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'

    - name: Stop nginx for standalone auth (if running)
      systemd:
        name: nginx
        state: stopped
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using standalone
      command: >
        certbot certonly --standalone --preferred-challenges http
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'
      ignore_errors: true

    - name: Obtain Let's Encrypt cert using webroot
      command: >
        certbot certonly --webroot
        --webroot-path {{ certbot_webroot }}
        --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ mirror_domain }}
      args:
        creates: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      when: certbot_enabled | bool and certbot_authenticator == 'webroot'
      ignore_errors: true

    - name: Start nginx after standalone certbot
      systemd:
        name: nginx
        state: started
      when: certbot_enabled | bool and certbot_authenticator == 'standalone'

    - name: Create Nginx HTTPS configuration for combined mirror
      template:
        src: nginx-https.conf.j2
        dest: /etc/nginx/conf.d/combined-mirror-https.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Update HTTP Nginx configuration to redirect to HTTPS
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/conf.d/combined-mirror.conf
        mode: '0644'
      notify: restart nginx
      when: certbot_enabled | bool

    - name: Ensure certbot renew cron job exists
      cron:
        name: "Certbot renew"
        job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
        minute: "{{ certbot_cron_schedule.minute }}"
        hour: "{{ certbot_cron_schedule.hour }}"
      when: certbot_enabled | bool and certbot_cron_enabled | bool

    - name: Check Nginx status
      command: systemctl status nginx
      register: nginx_status
      changed_when: false

    - name: Display Nginx status
      debug:
        msg: "{{ nginx_status.stdout_lines }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
