server {
    listen 80;
    server_name _;
    root /storage/swng;
    index index.html;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Enable directory listing
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # SWNG CloudLinux 9 repositories
    location /swng/9/ {
        alias /storage/swng/9/;
        autoindex on;
    }

    # SWNG CloudLinux 8 repositories (if enabled)
    location /swng/8/ {
        alias /storage/swng/8/;
        autoindex on;
    }

    # Optional SWNG prefix for mixed setups
    location /swng/ {
        alias /storage/swng/;
        autoindex on;
    }

    location = /swng {
        return 301 /swng/;
    }

    # Root location
    location / {
        try_files $uri $uri/ =404;
    }

    # Allow large file downloads
    client_max_body_size 0;
}

