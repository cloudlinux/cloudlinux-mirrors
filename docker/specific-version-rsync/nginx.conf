server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable directory listing
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # SWNG CloudLinux 9 repositories
    location /swng/9/ {
        alias /usr/share/nginx/html/swng/9/;
        autoindex on;
    }

    # SWNG CloudLinux 8 repositories (if enabled)
    location /swng/8/ {
        alias /usr/share/nginx/html/swng/8/;
        autoindex on;
    }

    # Root location
    location / {
        try_files $uri $uri/ =404;
    }

    # Allow large file downloads
    client_max_body_size 0;
}
