server {
    listen 80;
    server_name _;
    root /storage/swng;
    index index.html;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Enable directory listing
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # SWNG CloudLinux 10 repositories
    location /swng/10/ {
        alias /storage/swng/10/;
        autoindex on;
    }

    # Optional SWNG prefix for mixed setups
    location /swng/ {
        alias /storage/swng/;
        autoindex on;
    }

    location = /swng {
        return 301 /swng/;
    }

    # Allow large file downloads
    client_max_body_size 0;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __CERTBOT_DOMAIN__;
    root /storage/swng;
    index index.html;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/__CERTBOT_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERTBOT_DOMAIN__/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Enable directory listing
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Logging
    access_log /var/log/nginx/https-access.log;
    error_log /var/log/nginx/https-error.log;

    # SWNG CloudLinux 10 repositories
    location /swng/10/ {
        alias /storage/swng/10/;
        autoindex on;
    }

    # Optional SWNG prefix for mixed setups
    location /swng/ {
        alias /storage/swng/;
        autoindex on;
    }

    location = /swng {
        return 301 /swng/;
    }

    # Root location
    location / {
        try_files $uri $uri/ =404;
    }

    # Allow large file downloads
    client_max_body_size 0;
}
