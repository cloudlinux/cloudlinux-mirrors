---
- name: Verify Specific SWNG Version Mirror setup
  hosts: mirror_servers
  become: yes
  vars_files:
    - defaults/main.yml

  tasks:
    - name: Check storage mountpoint
      command: mountpoint -q {{ mirror_base_path }}
      register: mountpoint_check
      changed_when: false
      failed_when: false

    - name: Report storage mount
      debug:
        msg: "OK: {{ mirror_base_path }} is mounted"
      when: mountpoint_check.rc == 0

    - name: Fail if storage not mounted
      fail:
        msg: "ERROR: {{ mirror_base_path }} is not mounted"
      when: mountpoint_check.rc != 0

    - name: Check SWNG 8 directory exists
      stat:
        path: "{{ mirror_base_path }}/swng/8"
      register: swng8_dir

    - name: Check SWNG 9 directory exists
      stat:
        path: "{{ mirror_base_path }}/swng/9"
      register: swng9_dir

    - name: Assert at least one SWNG version exists
      assert:
        that:
          - swng8_dir.stat.exists or swng9_dir.stat.exists
        success_msg: "OK: SWNG mirror directory found"
        fail_msg: "ERROR: No SWNG version directories found under {{ mirror_base_path }}/swng"

    - name: Check swng-8 timer (if version 8 exists)
      systemd:
        name: swng-8-mirror.timer
      register: swng8_timer
      when: swng8_dir.stat.exists | default(false)

    - name: Assert swng-8 timer active
      assert:
        that:
          - swng8_timer.status.ActiveState == "active"
        success_msg: "OK: swng-8-mirror.timer is active"
        fail_msg: "ERROR: swng-8-mirror.timer is not active"
      when: swng8_dir.stat.exists | default(false)

    - name: Check swng-9 timer (if version 9 exists)
      systemd:
        name: swng-9-mirror.timer
      register: swng9_timer
      when: swng9_dir.stat.exists | default(false)

    - name: Assert swng-9 timer active
      assert:
        that:
          - swng9_timer.status.ActiveState == "active"
        success_msg: "OK: swng-9-mirror.timer is active"
        fail_msg: "ERROR: swng-9-mirror.timer is not active"
      when: swng9_dir.stat.exists | default(false)

    - name: Check nginx service
      systemd:
        name: nginx
      register: nginx_service

    - name: Assert nginx active
      assert:
        that:
          - nginx_service.status.ActiveState == "active"
        success_msg: "OK: nginx is active"
        fail_msg: "ERROR: nginx is not active"

    - name: Check if Let's Encrypt certificate exists
      stat:
        path: "/etc/letsencrypt/live/{{ mirror_domain }}/fullchain.pem"
      register: certbot_cert

    - name: Check HTTP access to /swng/8/ (if version 8 exists)
      uri:
        url: "http://{{ mirror_domain }}/swng/8/"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 200
          - 301
          - 302
      when: swng8_dir.stat.exists | default(false)

    - name: Check HTTP access to /swng/9/ (if version 9 exists)
      uri:
        url: "http://{{ mirror_domain }}/swng/9/"
        method: HEAD
        return_content: no
        follow_redirects: none
        status_code:
          - 200
          - 301
          - 302
      when: swng9_dir.stat.exists | default(false)

    - name: Check HTTPS access to /swng/8/ (if cert and version 8 exists)
      uri:
        url: "https://{{ mirror_domain }}/swng/8/"
        method: HEAD
        return_content: no
        status_code:
          - 200
          - 301
          - 302
        validate_certs: true
      when:
        - certbot_cert.stat.exists | default(false)
        - swng8_dir.stat.exists | default(false)

    - name: Check HTTPS access to /swng/9/ (if cert and version 9 exists)
      uri:
        url: "https://{{ mirror_domain }}/swng/9/"
        method: HEAD
        return_content: no
        status_code:
          - 200
          - 301
          - 302
        validate_certs: true
      when:
        - certbot_cert.stat.exists | default(false)
        - swng9_dir.stat.exists | default(false)

    - name: Verification complete
      debug:
        msg: "OK: verification completed"

